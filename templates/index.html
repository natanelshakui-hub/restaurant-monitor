<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מעקב הזמנות מסעדות</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Segoe UI', Arial, sans-serif; background: #f5f5f0; color: #1a1a1a; padding: 20px; }
  .container { max-width: 680px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 20px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat { background: #fff; border-radius: 10px; padding: 14px; border: 1px solid #e8e8e3; }
  .stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 500; }
  .card { background: #fff; border-radius: 12px; border: 1px solid #e8e8e3; padding: 16px 20px; margin-bottom: 10px; }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; }
  .rest-name { font-size: 16px; font-weight: 500; margin-bottom: 6px; }
  .badges { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
  .badge-ontopo { background: #e8f0fe; color: #1a56db; }
  .badge-tabit { background: #fde8f0; color: #c21a6b; }
  .badge-active { background: #e6f4ea; color: #137333; }
  .badge-paused { background: #f1f1f1; color: #888; }
  .meta { font-size: 13px; color: #666; display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .days { display: flex; gap: 6px; flex-wrap: wrap; }
  .day { font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 1px solid #ddd; color: #999; }
  .day.on { background: #f0f0f0; color: #333; border-color: #bbb; }
  .actions { display: flex; gap: 8px; align-items: center; }
  .toggle { position: relative; width: 38px; height: 22px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .knob { position: absolute; top:0; left:0; right:0; bottom:0; background: #ccc; border-radius: 22px; cursor: pointer; transition: .2s; }
  .knob:before { content:""; position:absolute; width:16px; height:16px; left:3px; bottom:3px; background:#fff; border-radius:50%; transition:.2s; }
  input:checked + .knob { background: #1D9E75; }
  input:checked + .knob:before { transform: translateX(16px); }
  .btn-del { background: none; border: 1px solid #fcc; color: #c00; border-radius: 8px; padding: 5px 10px; cursor: pointer; font-size: 13px; }
  .btn-del:hover { background: #fff0f0; }
  .add-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid #bbb; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
  .add-btn:hover { background: #f5f5f0; }
  .form { background: #fff; border: 1.5px solid #4a90e2; border-radius: 12px; padding: 20px; margin-bottom: 16px; display: none; }
  .form.open { display: block; }
  .form-title { font-size: 15px; font-weight: 500; margin-bottom: 14px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 12px; color: #666; }
  .fg input, .fg select { padding: 8px 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .days-pick { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
  .day-btn { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid #ddd; background: none; cursor: pointer; color: #666; }
  .day-btn.sel { background: #e8f0fe; color: #1a56db; border-color: #4a90e2; }
  .form-actions { display: flex; gap: 10px; margin-top: 14px; }
  .btn-save { background: #4a90e2; color: #fff; border: none; border-radius: 8px; padding: 8px 20px; font-size: 14px; cursor: pointer; font-weight: 500; }
  .btn-cancel { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 16px; font-size: 14px; cursor: pointer; color: #666; }
  .slug-hint { font-size: 11px; color: #999; margin-top: 3px; }
  .empty { text-align: center; color: #aaa; padding: 40px; font-size: 14px; }
  .last-alert { font-size: 11px; color: #aaa; margin-top: 6px; }
</style>
</head>
<body>
<div class="container">
  <h1>🔔 מעקב הזמנות מסעדות</h1>

  <div class="stats">
    <div class="stat"><div class="stat-label">מקומות במעקב</div><div class="stat-value" id="s-total">0</div></div>
    <div class="stat"><div class="stat-label">פעילים עכשיו</div><div class="stat-value" id="s-active">0</div></div>
    <div class="stat"><div class="stat-label">בדיקה כל</div><div class="stat-value" style="font-size:16px;padding-top:4px">5 דקות</div></div>
  </div>

  <button class="add-btn" onclick="toggleForm()">+ הוסף מקום</button>

  <div class="form" id="add-form">
    <div class="form-title">מקום חדש</div>
    <div class="form-grid">
      <div class="fg">
        <label>שם המסעדה / בר</label>
        <input id="f-name" type="text" placeholder='למשל: אנונה' />
      </div>
      <div class="fg">
        <label>פלטפורמה</label>
        <select id="f-platform">
          <option value="ontopo">אונטופו</option>
          <option value="tabit">טביט</option>
        </select>
      </div>
      <div class="fg">
        <label>כתובת באתר (slug)</label>
        <input id="f-slug" type="text" placeholder='למשל: anona-tlv' />
        <div class="slug-hint">מה שמופיע ב-URL של המסעדה באתר</div>
      </div>
      <div class="fg">
        <label>שעה מועדפת</label>
        <input id="f-time" type="time" value="20:00" />
      </div>
      <div class="fg">
        <label>מספר סועדים</label>
        <input id="f-guests" type="number" value="2" min="1" max="20" />
      </div>
    </div>
    <div class="fg">
      <label>ימים לניטור</label>
      <div class="days-pick" id="days-pick">
        <button class="day-btn" onclick="toggleDay(this,'א')">א׳</button>
        <button class="day-btn" onclick="toggleDay(this,'ב')">ב׳</button>
        <button class="day-btn" onclick="toggleDay(this,'ג')">ג׳</button>
        <button class="day-btn" onclick="toggleDay(this,'ד')">ד׳</button>
        <button class="day-btn" onclick="toggleDay(this,'ה')">ה׳</button>
        <button class="day-btn" onclick="toggleDay(this,'ו')">ו׳</button>
        <button class="day-btn" onclick="toggleDay(this,'ש')">ש׳</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="addRestaurant()">הוסף</button>
      <button class="btn-cancel" onclick="toggleForm()">ביטול</button>
    </div>
  </div>

  <div id="list"></div>
</div>

<script>
const DAYS_ALL = ['א','ב','ג','ד','ה','ו','ש'];
let selDays = [];

function toggleForm() {
  const f = document.getElementById('add-form');
  f.classList.toggle('open');
  selDays = [];
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('sel'));
  document.getElementById('f-name').value = '';
  document.getElementById('f-slug').value = '';
}

function toggleDay(btn, d) {
  if (selDays.includes(d)) { selDays = selDays.filter(x => x !== d); btn.classList.remove('sel'); }
  else { selDays.push(d); btn.classList.add('sel'); }
}

async function load() {
  const res = await fetch('/api/restaurants');
  const data = await res.json();
  render(data);
}

function render(data) {
  document.getElementById('s-total').textContent = data.length;
  document.getElementById('s-active').textContent = data.filter(r => r.active).length;
  const list = document.getElementById('list');
  if (!data.length) { list.innerHTML = '<div class="empty">אין מקומות במעקב עדיין<br>לחץ על "+ הוסף מקום" כדי להתחיל</div>'; return; }
  list.innerHTML = data.map(r => `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="rest-name">${r.name}</div>
          <div class="badges">
            <span class="badge badge-${r.platform}">${r.platform === 'ontopo' ? 'אונטופו' : 'טביט'}</span>
            <span class="badge ${r.active ? 'badge-active' : 'badge-paused'}">${r.active ? '● פעיל' : '⏸ מושהה'}</span>
          </div>
          <div class="meta">
            <span>🕐 ${r.time}</span>
            <span>👥 ${r.guests} סועדים</span>
          </div>
          <div class="days">
            ${DAYS_ALL.map(d => `<span class="day ${r.days?.includes(d) ? 'on' : ''}">${d}׳</span>`).join('')}
          </div>
          ${r.last_alert ? `<div class="last-alert">התראה אחרונה: ${new Date(r.last_alert).toLocaleString('he-IL')}</div>` : ''}
        </div>
        <div class="actions">
          <label class="toggle">
            <input type="checkbox" ${r.active ? 'checked' : ''} onchange="toggle(${r.id})">
            <span class="knob"></span>
          </label>
          <button class="btn-del" onclick="del(${r.id})">🗑</button>
        </div>
      </div>
    </div>
  `).join('');
}

async function addRestaurant() {
  const name = document.getElementById('f-name').value.trim();
  const slug = document.getElementById('f-slug').value.trim();
  if (!name || !slug) { alert('נא למלא שם וכתובת'); return; }
  if (!selDays.length) { alert('בחר לפחות יום אחד'); return; }
  await fetch('/api/restaurants', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name, slug,
      platform: document.getElementById('f-platform').value,
      time: document.getElementById('f-time').value,
      guests: parseInt(document.getElementById('f-guests').value),
      days: selDays
    })
  });
  toggleForm();
  load();
}

async function del(id) {
  if (!confirm('להסיר את המסעדה?')) return;
  await fetch(`/api/restaurants/${id}`, {method:'DELETE'});
  load();
}

async function toggle(id) {
  await fetch(`/api/restaurants/${id}/toggle`, {method:'POST'});
  load();
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
